<!DOCTYPE html>
<!-- HTML5 문서 유형을 선언합니다. -->

<head>
    <!-- 문서의 메타데이터(부가 정보)를 담는 영역입니다. -->
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS 스타일을 정의하는 영역입니다. -->
    <style>
        /* body 태그에 대한 스타일 정의 */
        body {
            background-color: #1a1a1a; /* 페이지 전체 배경색을 어두운 회색으로 설정 */
            color: white; /* 기본 글자색을 흰색으로 설정 */
            display: flex; /* 자식 요소들을 flexbox 레이아웃으로 배치 */
            flex-direction: column; /* 자식 요소들을 세로로 정렬 */
            justify-content: center; /* 세로 정렬 시 중앙에 배치 */
            align-items: center; /* 가로 정렬 시 중앙에 배치 */
            height: 100vh; /* body의 높이를 화면 전체 높이로 설정 */
            margin: 0; /* body의 기본 마진(여백)을 제거 */
            font-family: sans-serif; /* 기본 글꼴을 산세리프체로 설정 */
            overflow: hidden; /* 내용이 화면을 넘어가도 스크롤바가 생기지 않도록 함 */
        }

        /* id가 'instructions'인 요소에 대한 스타일 정의 */
        #instructions {
            margin-bottom: 20px; /* 아래쪽 여백을 20px로 설정 */
            font-size: 1.2em; /* 글자 크기를 기본 크기의 1.2배로 설정 */
            opacity: 0.8; /* 투명도를 80%로 설정하여 약간 흐리게 보이도록 함 */
        }

        /* id가 'svg-container'인 요소에 대한 스타일 정의 */
        #svg-container {
            width: 80%; /* 부모 요소(body) 너비의 80%를 차지하도록 설정 */
            max-width: 1000px; /* 최대 너비를 1000px로 제한하여 너무 커지지 않게 함 */
        }

        /* svg 태그에 대한 스타일 정의 */
        svg {
            width: 100%; /* 부모 요소(#svg-container)의 너비에 꽉 차게 설정 */
            height: auto; /* 높이는 너비에 맞춰 자동으로 조절되도록 함 */
            cursor: pointer; /* 마우스를 올렸을 때 커서 모양을 손가락 모양으로 변경 */
        }

        /* 'data-original="true"' 속성을 가진 path 요소에 대한 스타일 정의 */
        path[data-original="true"] {
            stroke-width: 1; /* 기존 원본 궤적들의 선 두께를 1로 명시적으로 설정 */
        }
    </style>

    <!-- JavaScript 코드를 작성하는 영역입니다. -->
    <script>
        // DOMContentLoaded: HTML 문서가 완전히 로드되고 파싱되었을 때 이벤트를 실행합니다.
        // 스크립트가 HTML 요소보다 먼저 실행되어 요소를 찾지 못하는 오류를 방지합니다.
        document.addEventListener('DOMContentLoaded', () => {
            // --- 변수 설정 --- //
            // 스크립트에서 사용할 주요 요소와 설정값들을 변수에 저장합니다.

            const svg = document.getElementById('interactive-svg'); // id로 SVG 요소를 찾아 변수에 저장
            const svgGroup = svg.querySelector('g'); // SVG 내부의 <g> 태그를 찾아 변수에 저장
            const svgNS = "http://www.w3.org/2000/svg"; // SVG 요소를 만들 때 필요한 네임스페이스 주소

            // 'data-original="true"' 속성을 가진 모든 path 요소를 찾아 배열로 만듭니다.
            const originalPaths = Array.from(svg.querySelectorAll('path[data-original="true"]'));
            // 동적으로 생성되어 추가될 path들을 담을 빈 배열
            const extraPaths = [];
            // 추가될 궤적의 최대 개수. 이 값을 높이면 더 촘촘해집니다.
            const MAX_DENSITY_LEVEL = 140;

            // --- 함수 정의 --- //
            // 스크립트의 주요 기능들을 함수 단위로 정의합니다.

            /**
             * 1. 추가될 중간 궤적(path)들을 미리 생성하는 함수
             * - 성능을 위해, 마우스를 움직일 때마다 생성하는 대신, 처음에 모두 만들어 숨겨둡니다.
             */
            function createExtraPaths() {
                // 원본 path들의 정보(요소, d 속성값, 중심 x좌표)를 객체로 만들어 배열에 저장합니다.
                // 그리고 중심 x좌표를 기준으로 오름차순 정렬합니다 (왼쪽 -> 오른쪽).
                const originalPathData = originalPaths.map(p => ({
                    element: p,
                    d: p.getAttribute('d'),
                    center: getPathCenter(p.getAttribute('d'))
                })).sort((a, b) => a.center - b.center);

                // 생성된 중간 궤적들을 임시로 담을 배열
                let generatedPaths = [];

                // 정렬된 원본 궤적들을 순회하며, 각 궤적 쌍 사이에 중간 궤적들을 생성합니다.
                for (let i = 0; i < originalPathData.length - 1; i++) {
                    const pathA = originalPathData[i];
                    const pathB = originalPathData[i+1];

                    // 두 궤적 사이의 간격에 몇 개의 중간 궤적을 만들지 결정합니다.
                    const steps = 10;
                    for (let j = 1; j <= steps; j++) {
                        // t는 두 궤적 사이의 위치를 나타내는 값 (0.0 ~ 1.0)
                        const t = j / (steps + 1);
                        // 두 궤적의 d 속성값을 보간하여 새로운 중간 궤적의 d 값을 계산합니다.
                        const newD = interpolatePathD(pathA.d, pathB.d, t);
                        
                        // SVG의 path 요소를 동적으로 생성합니다.
                        const newPath = document.createElementNS(svgNS, 'path');
                        // 계산된 d 속성값을 설정합니다.
                        newPath.setAttribute('d', newD);
                        // 선 색상은 기존 그라데이션을 재사용합니다.
                        newPath.setAttribute('stroke', 'url(#paint0_linear_206_507)');
                        // 추가된 궤적임을 시각적으로 구분하기 위해 투명도를 낮게 설정합니다.
                        newPath.setAttribute('stroke-opacity', '1');
                        newPath.setAttribute('stroke-miterlimit', '10');
                        // 추가된 궤적의 선 두께를 0.8로 설정 (원본의 80%)
                        newPath.setAttribute('stroke-width', '1');
                        // 채우기 색은 없도록 설정합니다.
                        newPath.setAttribute('fill', 'none');
                        // 처음에는 보이지 않도록 display 스타일을 'none'으로 설정합니다.
                        newPath.style.display = 'none';
                        // 생성된 path를 SVG 그룹(<g>)의 자식 요소로 추가합니다.
                        svgGroup.appendChild(newPath);
                        // 임시 배열에 생성된 path를 추가합니다.
                        generatedPaths.push(newPath);
                    }
                }

                // 인터랙션 요구사항에 맞게, 생성된 모든 중간 궤적들을 다시 정렬합니다.
                // 여기서는 왼쪽부터 오른쪽으로 채워지도록 x좌표 기준 오름차순으로 정렬합니다.
                generatedPaths.sort((a, b) => {
                    const aCenter = getPathCenter(a.getAttribute('d'));
                    const bCenter = getPathCenter(b.getAttribute('d'));
                    return aCenter - bCenter;
                });
                
                // 최종적으로 extraPaths 배열에 정렬된 궤적들을 저장합니다.
                extraPaths.push(...generatedPaths.slice(0, MAX_DENSITY_LEVEL));
            }

            /**
             * path의 d 속성 문자열에서 시작점의 x좌표를 추출하는 헬퍼 함수
             * @param {string} d - path의 d 속성값
             * @returns {number} - x좌표
             */
            function getPathCenter(d) {
                const match = d.match(/^M([\d\.]+)/); // 정규표현식으로 'M' 뒤의 숫자를 찾음
                return match ? parseFloat(match[1]) : 0;
            }

            /**
             * 두 숫자 사이의 특정 지점(t)에 있는 값을 계산하는 선형 보간 함수
             * @param {number} num1 - 시작 숫자
             * @param {number} num2 - 끝 숫자
             * @param {number} t - 위치 (0.0 ~ 1.0)
             * @returns {number} - 보간된 숫자
             */
            function interpolate(num1, num2, t) {
                return num1 * (1 - t) + num2 * t;
            }

            /**
             * 두 path의 d 속성값을 보간하여 새로운 d 값을 만들어내는 함수
             * @param {string} d1 - 시작 path의 d 값
             * @param {string} d2 - 끝 path의 d 값
             * @param {number} t - 위치 (0.0 ~ 1.0)
             * @returns {string} - 보간된 새로운 d 값
             */
            function interpolatePathD(d1, d2, t) {
                // d 문자열에서 숫자 부분만 추출하여 숫자 배열로 변환합니다.
                const nums1 = d1.match(/[\d\.]+/g).map(Number);
                const nums2 = d2.match(/[\d\.]+/g).map(Number);
                // 두 d값의 숫자 개수가 다르면 보간을 중단하고 원본을 반환합니다 (오류 방지).
                if (nums1.length !== nums2.length) return d1;

                // 두 숫자 배열의 각 항목을 순서대로 보간합니다.
                const interpolatedNums = nums1.map((n, i) => interpolate(n, nums2[i], t));
                
                // 보간된 숫자 배열을 다시 d 속성 문자열 형식으로 조립하여 반환합니다.
                return `M${interpolatedNums[0]} ${interpolatedNums[1]
                }C${interpolatedNums[2]} ${interpolatedNums[3]} ${interpolatedNums[4]} ${interpolatedNums[5]} ${interpolatedNums[6]} ${interpolatedNums[7]
                }C${interpolatedNums[8]} ${interpolatedNums[9]} ${interpolatedNums[10]} ${interpolatedNums[11]} ${interpolatedNums[12]} ${interpolatedNums[13]
                }C${interpolatedNums[14]} ${interpolatedNums[15]} ${interpolatedNums[16]} ${interpolatedNums[17]} ${interpolatedNums[18]} ${interpolatedNums[19]
                }C${interpolatedNums[20]} ${interpolatedNums[21]} ${interpolatedNums[22]} ${interpolatedNums[23]} ${interpolatedNums[24]} ${interpolatedNums[25]}Z`;
            }

            // --- 이벤트 리스너 설정 --- //
            // 사용자의 입력(마우스 움직임)에 반응하는 부분입니다.

            // SVG 요소 위에서 마우스가 움직일 때마다 실행될 이벤트를 등록합니다.
            svg.addEventListener('mousemove', (e) => {
                const svgBounds = svg.getBoundingClientRect(); // SVG 요소의 화면상 위치와 크기 정보를 가져옵니다.
                const mouseX = e.clientX - svgBounds.left; // SVG 내에서의 마우스 x좌표를 계산합니다.
                // 마우스 위치를 0(가장 왼쪽)과 1(가장 오른쪽) 사이의 비율로 변환합니다.
                const ratio = Math.max(0, Math.min(1, mouseX / svgBounds.width));

                // 비율에 따라 현재 보여줘야 할 추가 궤적의 개수를 계산합니다.
                const pathsToShow = Math.floor(ratio * extraPaths.length);

                // 모든 추가 궤적들을 순회하면서,
                extraPaths.forEach((path, index) => {
                    // 보여줘야 할 개수보다 현재 인덱스가 작으면 화면에 표시하고, 그렇지 않으면 숨깁니다.
                    path.style.display = index < pathsToShow ? 'block' : 'none';
                });
            });

            // SVG 요소에서 마우스가 벗어났을 때 실행될 이벤트를 등록합니다.
            svg.addEventListener('mouseleave', () => {
                // 모든 추가 궤적들을 순회하면서 화면에서 숨깁니다.
                extraPaths.forEach(path => {
                    path.style.display = 'none';
                });
            });

            // --- 스크립트 실행 --- //

            // 페이지가 처음 로드될 때, 중간 궤적들을 생성하는 함수를 호출하여 인터랙션을 준비합니다.
            createExtraPaths();
        });
    </script>

</body>
